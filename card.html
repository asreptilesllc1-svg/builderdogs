<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector Card Generator — Builder Dogs</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --orange: #f97316;
    --gold: #f5c842;
    --white: #f0ece0;
    --muted: #666;
    --green: #22c55e;
    --purple: #a855f7;
    --border: rgba(249,115,22,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { overflow-x:hidden; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    padding: 0 16px 60px;
  }
  nav {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 900px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Black Ops One', sans-serif; font-size: 18px; color: var(--orange); text-decoration: none; }
  .nav-logo span { color: var(--white); }
  .nav-back { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; }
  .nav-back:hover { color: var(--white); }

  .header { text-align: center; padding: 40px 0 32px; }
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--orange); margin-bottom: 12px; }
  h1 { font-family: 'Black Ops One', sans-serif; font-size: clamp(28px, 5vw, 48px); line-height: 1; margin-bottom: 12px; }
  h1 span { color: var(--orange); }
  .sub { font-size: 16px; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.6; }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 32px;
    max-width: 900px;
    margin: 0 auto;
    align-items: start;
  }

  /* CARD PREVIEW */
  .card-wrap { position: sticky; top: 20px; }
  .card {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(160deg, #1a1a1a 0%, #0d0d0d 100%);
    border: 3px solid var(--gold);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(245,200,66,0.02) 20px, rgba(245,200,66,0.02) 21px);
    pointer-events: none;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .card-logo { font-family: 'Black Ops One', sans-serif; font-size: 14px; color: var(--orange); }
  .card-logo span { color: var(--white); }
  .card-num { font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--gold); font-weight: 700; }

  .card-img-frame {
    background: radial-gradient(ellipse at center, #0d2b0d 0%, #071a07 100%);
    border: 2px solid rgba(245,200,66,0.3);
    border-radius: 10px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .card-img-frame img {
    width: 80%;
    height: 80%;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  }

  .card-name {
    font-family: 'Black Ops One', sans-serif;
    font-size: 26px;
    text-align: center;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
  }
  .card-trait {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
  .card-stat {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(245,200,66,0.15);
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .card-stat-lbl { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .card-stat-val { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); line-height: 1; }

  .card-footer {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }

  .rarity-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 4px;
    z-index: 2;
  }
  .rarity-legendary { background: rgba(249,115,22,0.2); color: var(--orange); border: 1px solid var(--orange); }
  .rarity-rare { background: rgba(168,85,247,0.2); color: var(--purple); border: 1px solid var(--purple); }
  .rarity-common { background: rgba(102,102,102,0.2); color: var(--muted); border: 1px solid var(--muted); }

  /* CONTROLS */
  .controls { display: flex; flex-direction: column; gap: 20px; }
  .control-group { }
  .control-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
  .control-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border 0.2s;
  }
  .control-input:focus { border-color: var(--orange); }

  .trait-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .trait-btn {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .trait-btn:hover { border-color: var(--orange); }
  .trait-btn.active { border-color: var(--gold); background: rgba(245,200,66,0.1); }
  .trait-btn img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

  .download-btn {
    font-family: 'Black Ops One', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    padding: 18px;
    background: var(--orange);
    color: #0a0a0a;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .download-btn:hover { background: #e06010; }

  @media(max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .card-wrap { position: relative; max-width: 340px; margin: 0 auto; }
    .trait-grid { grid-template-columns: repeat(6, 1fr); }
  }
  @media(max-width: 480px) {
    .trait-grid { grid-template-columns: repeat(5, 1fr); }
  }

  /* HOLOGRAPHIC & PREMIUM EFFECTS */
  .card {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out, box-shadow 0.3s;
  }

  .card-shine {
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.15) 45%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.15) 55%, transparent 70%);
    background-size: 200% 200%;
    background-position: -100% -100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 14px;
  }

  .card-wrap:hover .card-shine {
    opacity: 1;
    animation: shine-sweep 1.2s ease forwards;
  }

  @keyframes shine-sweep {
    0% { background-position: -150% -150%; }
    100% { background-position: 150% 150%; }
  }

  /* Legendary — animated holo foil */
  .card.tier-legendary {
    border-color: var(--orange);
    box-shadow: 0 20px 60px rgba(249,115,22,0.3), 0 0 40px rgba(249,115,22,0.15);
  }
  .card.tier-legendary .card-holo {
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg,
      rgba(249,115,22,0.15) 0%,
      rgba(245,200,66,0.15) 20%,
      rgba(168,85,247,0.15) 40%,
      rgba(34,197,94,0.15) 60%,
      rgba(249,115,22,0.15) 80%,
      rgba(245,200,66,0.15) 100%);
    background-size: 300% 300%;
    animation: holo-shift 4s ease infinite;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 2;
    border-radius: 14px;
  }

  @keyframes holo-shift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Rare — purple accent glow */
  .card.tier-rare {
    border-color: var(--purple);
    box-shadow: 0 20px 60px rgba(168,85,247,0.25), 0 0 30px rgba(168,85,247,0.12);
  }
  .card.tier-rare .card-holo {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(168,85,247,0.12) 50%, transparent 60%);
    background-size: 250% 250%;
    animation: holo-shift 5s ease infinite;
    pointer-events: none;
    z-index: 2;
    border-radius: 14px;
  }

  /* Common — subtle silver sheen */
  .card.tier-common {
    border-color: #888;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card.tier-common .card-holo { display: none; }

  /* Card entrance animation */
  .card-wrap {
    animation: card-enter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes card-enter {
    0% { opacity: 0; transform: scale(0.8) rotateY(-20deg); }
    100% { opacity: 1; transform: scale(1) rotateY(0deg); }
  }

  /* Rarity badge glow */
  .rarity-legendary {
    background: rgba(249,115,22,0.25);
    box-shadow: 0 0 12px rgba(249,115,22,0.5);
    animation: badge-pulse 2s ease-in-out infinite;
  }
  @keyframes badge-pulse {
    0%,100% { box-shadow: 0 0 8px rgba(249,115,22,0.4); }
    50% { box-shadow: 0 0 16px rgba(249,115,22,0.7); }
  }

  /* Stat bar visual */
  .rarity-bar-wrap {
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .rarity-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .rarity-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

</style>
</head>

const RARITY = {"Wizard": 86, "Builder": 158, "Afro": 34, "Army Hat": 22, "Bandana": 99, "Beanie": 154, "Bear": 60, "Birthday": 39, "Captain": 50, "Chef": 55, "Cowboy": 311, "Crown": 110, "Dad Hat": 26, "Firefighter": 72, "Gameday": 53, "Helicopter": 39, "Helmet": 47, "Jester": 49, "Painter": 124, "Pirate": 65, "Rasta": 60, "Snapback": 141, "Sombrero": 160, "Top Hat": 75, "Trucker": 18};


let selectedTrait = TRAITS[0];

// Build trait grid
const grid = document.getElementById('trait-grid');
TRAITS.forEach((t, i) => {
  const btn = document.createElement('div');
  btn.className = 'trait-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<img src="${t.img}" alt="${t.name}" title="${t.name}" />`;
  btn.onclick = () => {
    selectedTrait = t;
    document.querySelectorAll('.trait-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateCard();
  };
  grid.appendChild(btn);
});


function tiltCard(e) {
  const card = document.getElementById('card');
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const rotateX = ((y - cy) / cy) * -8;
  const rotateY = ((x - cx) / cx) * 8;
  card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
}

function resetTilt() {
  document.getElementById('card').style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale(1)';
}

function getRarityTier(count) {
  if (count <= 39) return { label: 'Legendary', cls: 'rarity-legendary' };
  if (count <= 99) return { label: 'Rare', cls: 'rarity-rare' };
  return { label: 'Common', cls: 'rarity-common' };
}

function updateCard() {
  const num = document.getElementById('input-num').value || '0000';
  const name = document.getElementById('input-name').value || 'Your Dog';
  const count = RARITY[selectedTrait.name] || 300;

  document.getElementById('card-num').textContent = '#' + num;
  document.getElementById('card-name').textContent = name.toUpperCase();
  document.getElementById('card-trait').textContent = selectedTrait.name + ' Hat';
  document.getElementById('card-img').src = selectedTrait.img;
  document.getElementById('card-rarity').textContent = '#' + count;
  document.getElementById('card-count').textContent = count;

  const tier = getRarityTier(count);
  const badge = document.getElementById('rarity-badge');
  badge.textContent = tier.label;
  badge.className = 'rarity-badge ' + tier.cls;

  const card = document.getElementById('card');
  card.className = 'card tier-' + tier.label.toLowerCase();

  // Rarity bar — inverse of count (lower count = fuller bar = rarer)
  const maxCount = 311;
  const pct = Math.max(6, 100 - (count / maxCount * 100));
  const barFill = document.getElementById('rarity-bar-fill');
  barFill.style.width = pct + '%';
  barFill.style.background = tier.label === 'Legendary' ? 'var(--orange)' : tier.label === 'Rare' ? 'var(--purple)' : '#888';
}

async function downloadCard() {
  const card = document.getElementById('card');
  const canvas = await html2canvas(card, { backgroundColor: null, scale: 3 });
  const link = document.createElement('a');
  const num = document.getElementById('input-num').value || 'card';
  link.download = `BuilderDogs_Card_${num}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

updateCard();
</script>
